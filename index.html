<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirage</title>
<link href="https://fonts.googleapis.com/css2?family=Afacad:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #f5f4f0; }
body { font-family: 'Afacad', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.wrap { text-align: center; padding: 40px 24px; }
.wordmark { font-size: 48px; font-weight: 400; letter-spacing: 0.04em; color: #1a1714; margin-bottom: 20px; }
.divider { width: 32px; height: 1px; background: #dddbd5; margin: 28px auto; }
.tagline { font-size: 13px; font-weight: 500; color: #8a8880; letter-spacing: 0.14em; text-transform: uppercase; }
.sub { font-size: 12px; color: #b0ada8; letter-spacing: 0.06em; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="wordmark">Mirage</div>
    <div class="divider"></div>
    <div class="tagline">Made to be wanted.</div>
    <div class="divider"></div>
    <div class="sub">Coming soon.</div>
  </div>
</body>
</html>
