<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirage</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,500&family=DM+Sans:opsz,wght@9..40,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'DM Sans', sans-serif; font-weight: 300;
    background: #f5f2ed; color: #1a1714;
    display: flex; align-items: center; justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: ''; position: fixed; inset: -100%; width: 300%; height: 300%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 10; opacity: 0.5;
    animation: grain 8s steps(10) infinite;
  }
  @keyframes grain {
    0%,100%{transform:translate(0,0)} 20%{transform:translate(-1%,-2%)}
    40%{transform:translate(2%,1%)} 60%{transform:translate(-1%,2%)} 80%{transform:translate(1%,-1%)}
  }
  .wrap { text-align: center; padding: 40px 24px; }
  .logo {
    font-family: 'Playfair Display', serif; font-style: italic;
    font-size: clamp(72px, 14vw, 140px); line-height: 1; letter-spacing: -0.03em;
    opacity: 0; animation: up 1s ease 0.1s both;
  }
  .tagline {
    font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
    color: rgba(26,23,20,0.35); margin-top: 18px;
    opacity: 0; animation: up 1s ease 0.35s both;
  }
  .divider { width: 32px; height: 1px; background: rgba(26,23,20,0.12); margin: 40px auto; opacity: 0; animation: fadeIn 1s ease 0.55s both; }
  .form { display: flex; gap: 8px; justify-content: center; max-width: 340px; margin: 0 auto; opacity: 0; animation: up 1s ease 0.65s both; }
  .input {
    flex: 1; padding: 12px 14px; background: rgba(26,23,20,0.04);
    border: 1px solid rgba(26,23,20,0.12); border-radius: 2px;
    font-size: 13px; color: #1a1714; outline: none;
    font-family: 'DM Sans', sans-serif; font-weight: 300; transition: border-color 0.15s; min-width: 0;
  }
  .input::placeholder { color: rgba(26,23,20,0.3); }
  .input:focus { border-color: rgba(26,23,20,0.3); }
  .btn {
    padding: 12px 20px; background: #1a1714; color: #f5f2ed; border: none; border-radius: 2px;
    font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
    font-family: 'DM Sans', sans-serif; cursor: pointer; white-space: nowrap; transition: opacity 0.15s; flex-shrink: 0;
  }
  .btn:hover { opacity: 0.8; }
  .success { display: none; font-family: 'Playfair Display', serif; font-style: italic; font-size: 20px; }
  @keyframes up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Mirage</div>
  <div class="tagline">Coming Soon</div>
  <div class="divider"></div>
  <div class="form" id="form">
    <input class="input" id="email" type="email" placeholder="your@email.com" onkeydown="if(event.key==='Enter')submit()" />
    <button class="btn" onclick="submit()">Notify Me</button>
  </div>
  <div class="success" id="success">You're on the list. ✦</div>
</div>
<script>
function submit() {
  const email = document.getElementById('email').value.trim();
  if (!email || !email.includes('@')) {
    document.getElementById('email').style.borderColor = 'rgba(176,48,37,0.4)';
    setTimeout(() => document.getElementById('email').style.borderColor = '', 1000);
    return;
  }
  try {
    const list = JSON.parse(localStorage.getItem('mirage-waitlist') || '[]');
    list.push({ email, ts: new Date().toISOString() });
    localStorage.setItem('mirage-waitlist', JSON.stringify(list));
  } catch(e) {}
  document.getElementById('form').style.display = 'none';
  document.getElementById('success').style.display = 'block';
}
</script>
</body>
</html>
