<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirage</title>
<link href="https://fonts.googleapis.com/css2?family=Afacad:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #f5f4f0; }
body {
  font-family: 'Afacad', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
.wrap {
  text-align: center;
  padding: 40px 24px;
}
.wordmark {
  font-size: 48px;
  font-weight: 400;
  letter-spacing: 0.04em;
  color: #1a1714;
  margin-bottom: 20px;
}
.tagline {
  font-size: 15px;
  font-weight: 400;
  color: #8a8880;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  line-height: 1.6;
}
.divider {
  width: 32px;
  height: 1px;
  background: #dddbd5;
  margin: 28px auto;
}
.sub {
  font-size: 13px;
  color: #b0ada8;
  letter-spacing: 0.04em;
}
</style>
</head>
<body>
  <div class="wrap">
    <div class="wordmark">Mirage</div>
    <div class="divider"></div>
    <div class="tagline">AI-generated icons. Editorial aesthetic.<br>American Apparel 2000s. Clearly synthetic.</div>
    <div class="divider"></div>
    <div class="sub">Coming soon.</div>
  </div>
</body>
</html>
