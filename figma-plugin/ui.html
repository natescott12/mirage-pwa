<!DOCTYPE html>
<html>
<body>
<div id="s" style="font:11px system-ui;color:#888;background:#111;padding:0 16px;line-height:48px">Sloan Live — watching...</div>
<script>
var PROXY = 'https://mirage-proxy-production.up.railway.app';
var KEY = 'mirage-int-2026';
var busy = false;

window.onerror = function(msg) {
  parent.postMessage({ pluginMessage: { type: 'ERROR', error: String(msg) } }, '*');
};

function poll() {
  if (busy) return;
  fetch(PROXY + '/sloan/figma/pending', { headers: { 'x-mirage-key': KEY } })
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(data) {
      if (data && data.id) {
        busy = true;
        document.getElementById('s').textContent = 'Task received — ' + data.id.slice(0,8);
        parent.postMessage({ pluginMessage: { type: 'EXECUTE_TASK', task: data } }, '*');
      }
    })
    .catch(function(e) {
      parent.postMessage({ pluginMessage: { type: 'ERROR', error: e.message } }, '*');
    });
}

window.onmessage = function(event) {
  var msg = event.data.pluginMessage;
  if (!msg) return;
  if (msg.type === 'TASK_DONE') {
    fetch(PROXY + '/sloan/figma/' + msg.id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'x-mirage-key': KEY },
      body: JSON.stringify({ status: msg.status, result: msg.result || '' })
    }).catch(function(){});
    busy = false;
    document.getElementById('s').textContent = 'Sloan Live — watching...';
  }
};

setInterval(poll, 3000);
</script>
</body>
</html>
