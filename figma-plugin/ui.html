<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0f0e0d;
    color: #f6eaea;
    width: 280px;
    padding: 20px;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .wordmark {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(246,234,234,0.4);
  }
  .wordmark span { color: #c9622f; }

  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .pulse {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #c9622f;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .pulse.active {
    opacity: 1;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.2); }
  }
  .status-text {
    font-size: 11px;
    letter-spacing: 0.06em;
    color: rgba(246,234,234,0.65);
  }

  .error-detail {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 10px;
    line-height: 1.4;
    color: rgba(201,98,47,0.75);
    margin-top: -6px;
    margin-bottom: 12px;
    word-break: break-word;
    min-height: 0;
    display: none;
  }
  .error-detail.visible { display: block; }

  .progress-wrap {
    height: 2px;
    background: rgba(246,234,234,0.06);
    border-radius: 1px;
    margin-bottom: 14px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .progress-wrap.visible { opacity: 1; }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: #c9622f;
    border-radius: 1px;
    transition: width 0.2s ease-out;
  }

  .last-task {
    font-size: 10px;
    color: rgba(246,234,234,0.3);
    letter-spacing: 0.04em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 16px;
    min-height: 14px;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .toggle-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(246,234,234,0.4);
  }
  .toggle {
    width: 32px; height: 16px;
    background: rgba(246,234,234,0.1);
    border-radius: 8px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle.on { background: rgba(201,98,47,0.4); }
  .toggle-knob {
    width: 12px; height: 12px;
    background: rgba(246,234,234,0.5);
    border-radius: 50%;
    position: absolute;
    top: 2px; left: 2px;
    transition: left 0.2s, background 0.2s;
  }
  .toggle.on .toggle-knob {
    left: 18px;
    background: #c9622f;
  }
</style>
</head>
<body>

<div class="header">
  <div class="wordmark">Sloan <span>Live</span></div>
</div>

<div class="status-row">
  <div class="pulse" id="pulse"></div>
  <div class="status-text" id="status">Watching...</div>
</div>

<div class="error-detail" id="errorDetail"></div>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div class="last-task" id="lastTask"></div>

<div class="toggle-row">
  <div class="toggle-label">Theatre Mode</div>
  <div class="toggle on" id="toggle" onclick="toggleTheatre()">
    <div class="toggle-knob"></div>
  </div>
</div>

<script>
// All network I/O lives here. Figma plugins block fetches from the main
// thread; the UI runs in an iframe with its own network scope. code.js
// executes Figma API calls only and coordinates with us via postMessage.

var PROXY = 'https://mirage-proxy-production.up.railway.app';
var POLL_MS = 3000;
var MIRAGE_KEY = 'mirage-int-2026';

var theatreMode = true;

function toggleTheatre() {
  theatreMode = !theatreMode;
  var el = document.getElementById('toggle');
  el.classList.toggle('on', theatreMode);
  parent.postMessage({ pluginMessage: { type: 'theatre', value: theatreMode } }, '*');
}

function setStatus(text, active) {
  document.getElementById('status').textContent = text;
  document.getElementById('pulse').classList.toggle('active', !!active);
}

function setProgress(pct) {
  var wrap = document.getElementById('progressWrap');
  var bar = document.getElementById('progressBar');
  wrap.classList.toggle('visible', pct > 0 && pct < 100);
  bar.style.width = Math.min(100, Math.max(0, pct)) + '%';
}

function setLastTask(name) {
  document.getElementById('lastTask').textContent = name ? 'Last: ' + name : '';
}

function setErrorDetail(text) {
  var el = document.getElementById('errorDetail');
  el.textContent = text || '';
  el.classList.toggle('visible', !!text);
}

function toCodeJs(obj) { parent.postMessage({ pluginMessage: obj }, '*'); }

// PATCH a task's state on the proxy. Returns true iff the server
// responded with 2xx, false on every other outcome (network error,
// non-ok response). Callers that need to know whether the patch
// actually landed must check the return value.
//
// Status collapse rule: 'failed' becomes 'complete' so a failed task
// cannot be left sitting in a lingering non-terminal state. All other
// statuses pass through unchanged — this is important for the new
// 'in_progress' claim step in poll(), which must not be collapsed.
// The incoming failure signal is preserved in `result`.
async function patchTaskReq(id, status, result) {
  var finalStatus = (status === 'failed') ? 'complete' : status;
  var payload = { status: finalStatus, result: result || null };
  try {
    var r = await fetch(PROXY + '/sloan/figma/' + id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'x-mirage-key': MIRAGE_KEY },
      body: JSON.stringify(payload),
    });
    var body = await r.text().catch(function(){ return ''; });
    if (r.ok) {
      console.log('[sloan-live/ui] patch OK —', id, 'requested:', status, '→ sent:', finalStatus, '→ HTTP', r.status, body || '(empty body)');
      return true;
    }
    console.warn('[sloan-live/ui] patch FAIL —', id, 'requested:', status, '→ sent:', finalStatus, '→ HTTP', r.status, body);
    return false;
  } catch (e) {
    console.warn('[sloan-live/ui] patch exception —', id, 'requested:', status, '→ sent:', finalStatus, '→', e && e.message);
    return false;
  }
}

// Fire-and-forget claim model. On each poll:
//
//   1. Fetch the next pending task from the proxy.
//   2. If we just handled this task ID, back off 10s — the previous
//      terminal PATCH must have failed to land, so the DB still has
//      it as pending. Never re-execute the same task.
//   3. Fire the 'in_progress' claim PATCH in the background — do NOT
//      await it. Execution proceeds regardless of claim outcome.
//   4. Hand the task off to code.js immediately.
//   5. code.js's terminal PATCH (complete/failed) triggers the next
//      poll via the message handler; PATCH success uses POLL_MS,
//      failure uses a 10s back-off. Any PATCH failure is logged but
//      never causes a retry of the same task.

// Remembers the last task ID we dispatched — used to dedup when the
// proxy keeps returning the same row because the terminal PATCH
// never landed. Prevents infinite loops on the same task.
var sloanLastTaskId = null;

// [FIGMA_IMAGE: url] — directive Sloan can emit to drop a reference
// image into 00 — Sloan's Workshop. The plugin extracts every URL
// it finds, fetches each through the proxy's /proxy-image endpoint
// (manifest.networkAccess only whitelists the Railway host, so
// direct external fetches would be blocked), hands the bytes off to
// code.js as a 'place-image' message, and marks the task complete.
// code.js creates a rect with image fill on page 00 and labels it
// with the shortened URL.
function extractFigmaImageUrls(text) {
  if (!text) return [];
  var re = /\[FIGMA_IMAGE:\s*([^\]]+)\]/gi;
  var urls = [];
  var m;
  while ((m = re.exec(text)) !== null) {
    var u = (m[1] || '').trim();
    if (u) urls.push(u);
  }
  return urls;
}

async function fetchImageViaProxy(url) {
  var proxyUrl = PROXY + '/proxy-image?url=' + encodeURIComponent(url);
  var r = await fetch(proxyUrl);
  if (!r.ok) {
    var body = await r.text().catch(function(){ return ''; });
    throw new Error('proxy-image ' + r.status + ' ' + (body || '').slice(0, 80));
  }
  var buf = await r.arrayBuffer();
  return Array.from(new Uint8Array(buf));
}

async function handleFigmaImageTask(task, urls) {
  console.log('[sloan-live/ui] FIGMA_IMAGE directive — placing', urls.length, 'image(s) for task', task.id);
  setStatus('Placing ' + urls.length + ' image(s)...', true);
  var placed = 0;
  var failed = 0;
  for (var i = 0; i < urls.length; i++) {
    var url = urls[i];
    try {
      var bytes = await fetchImageViaProxy(url);
      toCodeJs({ type: 'place-image', url: url, bytes: bytes });
      placed++;
    } catch (e) {
      console.warn('[sloan-live/ui] fetch failed for', url, '—', e && e.message);
      failed++;
    }
  }
  var summary = 'Placed ' + placed + ' image(s)' + (failed ? ' (' + failed + ' failed)' : '');
  setLastTask(summary);
  // Call patchTaskReq directly instead of routing through toCodeJs —
  // code.js has no 'patch' handler, so the message was being silently
  // dropped, leaving tasks stuck in_progress forever (see stuck
  // efa44e11 from 2026-04-21). Polling resumes at POLL_MS on PATCH
  // success, backs off 10s on PATCH failure — matches the terminal-
  // patch behavior used by the normal code-exec path.
  patchTaskReq(task.id, placed ? 'complete' : 'failed', summary)
    .then(function (ok) { setTimeout(poll, ok ? POLL_MS : 10000); });
}

async function poll() {
  try {
    var r = await fetch(PROXY + '/sloan/figma/pending', { headers: { 'x-mirage-key': MIRAGE_KEY } });
    if (!r.ok) {
      setStatus('Error — check console', false);
      setErrorDetail('HTTP ' + r.status + ' from /sloan/figma/pending');
      setProgress(0);
      setTimeout(poll, 10000);
      return;
    }
    var task = await r.json();
    if (!task || !task.id) {
      setStatus('Queue empty', false);
      setErrorDetail('');
      setProgress(0);
      setTimeout(poll, POLL_MS);
      return;
    }

    // Dedup — if /pending just returned the same task id we already
    // dispatched, a PATCH (claim or terminal) failed to advance its
    // state. Skip re-execution and back off 10s.
    if (task.id === sloanLastTaskId) {
      console.warn('[sloan-live/ui] task', task.id, 'still pending after previous pass — terminal PATCH must have failed. skipping re-execution, backing off 10s.');
      setStatus('Error — check console', false);
      setErrorDetail('task ' + task.id + ' still pending — backing off');
      setProgress(0);
      setTimeout(poll, 10000);
      return;
    }
    sloanLastTaskId = task.id;
    setErrorDetail('');

    // Fire claim PATCH in parallel — do not await. Failures are
    // logged inside patchTaskReq and inspected here purely for the
    // log line; execution proceeds regardless.
    patchTaskReq(task.id, 'in_progress', null).then(function(ok) {
      if (!ok) {
        console.warn('[sloan-live/ui] claim PATCH failed for', task.id, '— execution already underway');
      }
    });

    // If the task carries any [FIGMA_IMAGE: url] directives, handle
    // the image-placement branch instead of the normal code-exec path
    // (they're mutually exclusive — FIGMA_IMAGE tasks don't ship with
    // figma_code). Falls through to the regular task dispatch when
    // no directive is present.
    var figmaImageUrls = extractFigmaImageUrls((task.task || '') + '\n' + (task.figma_code || ''));
    if (figmaImageUrls.length) {
      handleFigmaImageTask(task, figmaImageUrls);
      return;
    }

    // Hand the task off immediately. Terminal PATCH from code.js
    // drives the next poll via the message handler below.
    toCodeJs({ type: 'task', task: task });
  } catch (e) {
    console.warn('[sloan-live/ui] poll error:', e && e.message);
    setStatus('Error — check console', false);
    setErrorDetail((e && e.message) || 'unknown');
    setProgress(0);
    setTimeout(poll, 10000);
  }
}

window.onmessage = function(e) {
  var msg = e.data.pluginMessage;
  if (!msg) return;
  if (msg.type === 'ready')    { setStatus('Watching...', true); setProgress(0); setErrorDetail(''); }
  if (msg.type === 'working')  { setStatus('Sloan is working...', true); setProgress(2); setErrorDetail(''); }
  if (msg.type === 'progress') { setProgress(msg.percent || 0); }
  if (msg.type === 'complete') { setStatus('Ready for review', false); setProgress(100); setTimeout(function(){ setProgress(0); }, 1500); setLastTask(msg.task); setErrorDetail(''); }
  if (msg.type === 'empty')    { setStatus('Queue empty', false); setProgress(0); setErrorDetail(''); }
  if (msg.type === 'error')    { setStatus('Error — check console', false); setProgress(0); setErrorDetail(msg.message || 'unknown'); }
  if (msg.type === 'patch') {
    // Terminal PATCH drives the next poll. On success → normal cadence.
    // On failure → 10s back-off. Never retry the same task — dedup in
    // poll() catches any case where the task row stays pending.
    // Non-terminal (running) patches fire-and-forget with no scheduling.
    if (msg.status === 'complete' || msg.status === 'failed') {
      patchTaskReq(msg.id, msg.status, msg.result).then(function(ok) {
        if (!ok) console.warn('[sloan-live/ui] terminal PATCH failed for', msg.id, '— backing off 10s');
        setTimeout(poll, ok ? POLL_MS : 10000);
      });
    } else {
      patchTaskReq(msg.id, msg.status, msg.result);
    }
  }
};

// Kick off the loop on load. code.js will post {type:'ready'} shortly;
// if our first poll runs before that message arrives and finds no
// task, we just continue polling until one appears.
poll();
</script>

</body>
</html>
