<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0f0e0d;
    color: #f6eaea;
    width: 280px;
    padding: 20px;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .wordmark {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(246,234,234,0.4);
  }
  .wordmark span { color: #c9622f; }

  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .pulse {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #c9622f;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .pulse.active {
    opacity: 1;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.2); }
  }
  .status-text {
    font-size: 11px;
    letter-spacing: 0.06em;
    color: rgba(246,234,234,0.65);
  }

  .progress-wrap {
    height: 2px;
    background: rgba(246,234,234,0.06);
    border-radius: 1px;
    margin-bottom: 14px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .progress-wrap.visible { opacity: 1; }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: #c9622f;
    border-radius: 1px;
    transition: width 0.2s ease-out;
  }

  .last-task {
    font-size: 10px;
    color: rgba(246,234,234,0.3);
    letter-spacing: 0.04em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 16px;
    min-height: 14px;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .toggle-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(246,234,234,0.4);
  }
  .toggle {
    width: 32px; height: 16px;
    background: rgba(246,234,234,0.1);
    border-radius: 8px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle.on { background: rgba(201,98,47,0.4); }
  .toggle-knob {
    width: 12px; height: 12px;
    background: rgba(246,234,234,0.5);
    border-radius: 50%;
    position: absolute;
    top: 2px; left: 2px;
    transition: left 0.2s, background 0.2s;
  }
  .toggle.on .toggle-knob {
    left: 18px;
    background: #c9622f;
  }
</style>
</head>
<body>

<div class="header">
  <div class="wordmark">Sloan <span>Live</span></div>
</div>

<div class="status-row">
  <div class="pulse" id="pulse"></div>
  <div class="status-text" id="status">Watching...</div>
</div>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div class="last-task" id="lastTask"></div>

<div class="toggle-row">
  <div class="toggle-label">Theatre Mode</div>
  <div class="toggle on" id="toggle" onclick="toggleTheatre()">
    <div class="toggle-knob"></div>
  </div>
</div>

<script>
window.onerror = function(msg, src, line, col, err) {
  console.error('[ui] uncaught:', msg, 'at', src, line);
  try { parent.postMessage({ pluginMessage: { type: 'ERROR', error: String(msg).slice(0, 200) } }, '*'); } catch(_){}
};

var PROXY = 'https://mirage-proxy-production.up.railway.app';
var INTERNAL_KEY = 'mirage-int-2026';
var POLL_MS = 3000;
var theatreMode = true;
var busy = false;

function toggleTheatre() {
  theatreMode = !theatreMode;
  document.getElementById('toggle').classList.toggle('on', theatreMode);
  parent.postMessage({ pluginMessage: { type: 'theatre', value: theatreMode } }, '*');
}

function setStatus(text, active) {
  document.getElementById('status').textContent = text;
  document.getElementById('pulse').classList.toggle('active', !!active);
}

function setProgress(pct) {
  var wrap = document.getElementById('progressWrap');
  var bar = document.getElementById('progressBar');
  wrap.classList.toggle('visible', pct > 0 && pct < 100);
  bar.style.width = Math.min(100, Math.max(0, pct)) + '%';
}

function setLastTask(name) {
  document.getElementById('lastTask').textContent = name ? 'Last: ' + name : '';
}

// ── Network layer — all fetch calls live here ──

function proxyHeaders(json) {
  var h = { 'x-mirage-key': INTERNAL_KEY };
  if (json) h['Content-Type'] = 'application/json';
  return h;
}

async function fetchPending() {
  try {
    var r = await fetch(PROXY + '/sloan/figma/pending', { headers: proxyHeaders() });
    if (!r.ok) return null;
    return await r.json();
  } catch (e) { console.warn('[ui] poll error:', e.message); return null; }
}

async function patchTask(id, status, result) {
  try {
    await fetch(PROXY + '/sloan/figma/' + id, {
      method: 'PATCH',
      headers: proxyHeaders(true),
      body: JSON.stringify({ status: status, result: result || null }),
    });
  } catch (e) { console.warn('[ui] patch error:', e.message); }
}

// ── Poll loop ──

async function poll() {
  if (busy) return;

  var task = await fetchPending();
  if (!task || !task.id) {
    setStatus('Queue empty', false);
    setProgress(0);
    return;
  }

  busy = true;
  var taskName = (task.task || '').slice(0, 80);
  setStatus('Sloan is working...', true);
  setProgress(2);

  // Mark running
  await patchTask(task.id, 'running');

  // Send task to code.js for Figma API execution
  parent.postMessage({ pluginMessage: { type: 'EXECUTE_TASK', task: task } }, '*');
}

// ── Listen for results from code.js ──

window.onmessage = function(e) {
  var msg = e.data.pluginMessage;
  if (!msg) return;

  if (msg.type === 'TASK_DONE') {
    patchTask(msg.id, msg.status || 'complete', msg.result || null);
    setStatus('Ready for review', false);
    setProgress(100);
    setTimeout(function() { setProgress(0); }, 1500);
    setLastTask(msg.result || '');
    busy = false;
  }

  if (msg.type === 'progress') { setProgress(msg.percent || 0); }
};

// ── Start polling ──

setStatus('Watching...', true);
setInterval(function() {
  try { poll(); } catch (e) {
    console.error('[ui] poll crash:', e.message);
    parent.postMessage({ pluginMessage: { type: 'ERROR', error: 'Poll crash: ' + e.message } }, '*');
  }
}, POLL_MS);
</script>

</body>
</html>
